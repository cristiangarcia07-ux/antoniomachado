<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de la Compra</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ════════════════════════════════════════════════════ -->
  <!--  PANTALLA DE AUTENTICACIÓN                         -->
  <!-- ════════════════════════════════════════════════════ -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <h1>Lista de la Compra</h1>
      <p class="auth-subtitle">Inicia sesión con Google para continuar</p>

      <button id="google-login-btn" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Iniciar sesión con Google
      </button>

      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════ -->
  <!--  PANTALLA PRINCIPAL (LISTA DE LA COMPRA)           -->
  <!-- ════════════════════════════════════════════════════ -->
  <div id="app-screen" class="screen hidden">
    <header class="app-header">
      <h1>🛒 Lista de la Compra</h1>
      <div class="header-right">
        <span id="user-email" class="user-email"></span>
        <div style="display:flex;gap:0.4rem;align-items:center">
          <button id="theme-toggle" class="btn-outline theme-toggle" title="Cambiar tema">🌙</button>
          <button id="logout-btn" class="btn-outline">Cerrar Sesión</button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <!-- Formulario para añadir / editar -->
      <form id="item-form" class="item-form">
        <input type="text" id="item-name" placeholder="Nombre del artículo" required />
        <input type="number" id="item-qty" placeholder="Cantidad" value="1" min="1" />
        <button type="submit" class="btn-primary" id="form-submit-btn">Añadir</button>
        <button type="button" class="btn-secondary hidden" id="form-cancel-btn">Cancelar</button>
      </form>

      <!-- Lista de artículos -->
      <ul id="shopping-list" class="shopping-list">
        <!-- Se renderiza desde JavaScript -->
      </ul>

      <p id="empty-msg" class="empty-msg">La lista está vacía. ¡Añade artículos!</p>
    </main>
  </div>

  <!-- ════════════════════════════════════════════════════ -->
  <!--  FIREBASE SDK (COMPAT)                             -->
  <!-- ════════════════════════════════════════════════════ -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- ════════════════════════════════════════════════════ -->
  <!--  SCRIPTS DE LA APLICACIÓN                          -->
  <!-- ════════════════════════════════════════════════════ -->
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
